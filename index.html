<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Spend Ledger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:       #F5F0E8;
      --cream-dark:  #EDE6D6;
      --ink:         #1A1A1A;
      --ink-light:   #4A4A4A;
      --ink-muted:   #8A8A8A;
      --forest:      #1C4532;
      --forest-mid:  #276146;
      --forest-light:#3A8C62;
      --terra:       #C85B3A;
      --terra-light: #E8745A;
      --gold:        #C9922A;
      --white:       #FFFFFF;
      --shadow-sm:   0 1px 4px rgba(0,0,0,0.08);
      --shadow-md:   0 4px 16px rgba(0,0,0,0.10);
      --shadow-lg:   0 8px 32px rgba(0,0,0,0.12);
      --radius:      10px;
      --radius-lg:   16px;
    }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: 'Lato', sans-serif;
      min-height: 100vh;
      padding: 0 0 60px;
    }

    /* ─── BACKGROUND TEXTURE ─────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        radial-gradient(circle at 20% 20%, rgba(28,69,50,0.04) 0%, transparent 60%),
        radial-gradient(circle at 80% 80%, rgba(200,91,58,0.04) 0%, transparent 60%);
      pointer-events: none; z-index: 0;
    }

    /* ─── HEADER ─────────────────────────────────── */
    header {
      background: var(--forest);
      color: var(--white);
      padding: 28px 24px 24px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 4px 24px rgba(28,69,50,0.25);
    }
    .header-inner {
      max-width: 640px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      gap: 16px; flex-wrap: wrap;
    }
    .brand h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; font-weight: 700;
      letter-spacing: 0.01em;
      line-height: 1.1;
    }
    .brand p {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem; font-weight: 300;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 2px;
    }
    .currency-wrap {
      display: flex; align-items: center; gap: 8px;
    }
    .currency-wrap label {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.55);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    #currency {
      background: rgba(255,255,255,0.12);
      color: var(--white);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 6px 10px;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      cursor: pointer;
      outline: none;
      transition: background 0.2s;
    }
    #currency option { background: var(--forest); }
    #currency:hover { background: rgba(255,255,255,0.2); }

    /* ─── METRICS STRIP ──────────────────────────── */
    .metrics-strip {
      background: var(--forest-mid);
      padding: 12px 24px;
    }
    .metrics-inner {
      max-width: 640px; margin: 0 auto;
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; text-align: center;
    }
    .metric-card {
      padding: 10px 4px;
    }
    .metric-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      margin-bottom: 4px;
    }
    .metric-value {
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: var(--white);
      letter-spacing: -0.01em;
    }
    .metric-card.accent .metric-value { color: #7ED4A4; }
    .metric-card.terra .metric-value { color: #F5A082; }

    /* ─── MAIN CONTENT ───────────────────────────── */
    main {
      max-width: 640px; margin: 0 auto;
      padding: 24px 20px 0;
      position: relative; z-index: 1;
    }

    /* ─── FORM CARD ──────────────────────────────── */
    .form-card {
      background: var(--white);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 24px;
      margin-bottom: 28px;
      border: 1px solid rgba(0,0,0,0.06);
    }
    .form-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--forest);
      margin-bottom: 18px;
      display: flex; align-items: center; gap: 8px;
    }
    .form-card h2 i { font-size: 0.85rem; opacity: 0.6; }

    .form-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-bottom: 12px;
    }
    .form-full { margin-bottom: 12px; }

    .field-wrap { display: flex; flex-direction: column; gap: 5px; }
    .field-wrap label {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }
    .field-wrap input,
    .field-wrap select {
      padding: 9px 12px;
      border: 1.5px solid var(--cream-dark);
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      color: var(--ink);
      background: var(--cream);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
    }
    .field-wrap input:focus,
    .field-wrap select:focus {
      border-color: var(--forest-light);
      box-shadow: 0 0 0 3px rgba(58,140,98,0.12);
      background: var(--white);
    }
    .field-wrap input[type="number"] { font-size: 0.9rem; }

    .payment-group {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 16px;
    }
    .pay-btn {
      padding: 9px 12px;
      border: 1.5px solid var(--cream-dark);
      border-radius: 8px;
      background: var(--cream);
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      color: var(--ink-light);
      cursor: pointer;
      display: flex; align-items: center;
      justify-content: center; gap: 6px;
      transition: all 0.2s;
      outline: none;
    }
    .pay-btn:hover { border-color: var(--forest-light); color: var(--forest); }
    .pay-btn.active {
      background: var(--forest);
      border-color: var(--forest);
      color: var(--white);
      box-shadow: 0 2px 8px rgba(28,69,50,0.2);
    }

    .submit-btn {
      width: 100%;
      padding: 12px;
      background: var(--forest);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-family: 'Lato', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      display: flex; align-items: center;
      justify-content: center; gap: 8px;
      transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    }
    .submit-btn:hover {
      background: var(--forest-light);
      box-shadow: 0 4px 16px rgba(28,69,50,0.25);
    }
    .submit-btn:active { transform: scale(0.99); }

    /* ─── ENTRIES SECTION ────────────────────────── */
    .entries-header {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .entries-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--ink);
    }
    .entry-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      background: var(--cream-dark);
      color: var(--ink-muted);
      padding: 3px 8px; border-radius: 20px;
      letter-spacing: 0.06em;
    }

    /* ─── DATE GROUP ─────────────────────────────── */
    .date-group { margin-bottom: 20px; }
    .date-group-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.63rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 8px;
      padding: 0 2px;
      display: flex; align-items: center; gap: 8px;
    }
    .date-group-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--cream-dark);
    }

    /* ─── ENTRY ITEM ─────────────────────────────── */
    .entry-item {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-sm);
      padding: 13px 16px;
      margin-bottom: 8px;
      display: flex; align-items: center;
      gap: 12px;
      border: 1px solid rgba(0,0,0,0.05);
      transition: box-shadow 0.2s, transform 0.15s;
      animation: slideIn 0.3s ease;
      position: relative;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .entry-item:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .pay-badge {
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      flex-shrink: 0;
    }
    .pay-badge.cash {
      background: rgba(201,146,42,0.12);
      color: var(--gold);
    }
    .pay-badge.upi {
      background: rgba(28,69,50,0.1);
      color: var(--forest);
    }

    .entry-body { flex: 1; min-width: 0; }
    .entry-desc {
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-meta {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--ink-muted);
      margin-top: 2px;
    }

    .entry-amount {
      font-family: 'DM Mono', monospace;
      font-size: 0.92rem;
      font-weight: 500;
      color: var(--terra);
      flex-shrink: 0;
    }

    .delete-btn {
      width: 28px; height: 28px;
      border: none; background: none;
      color: var(--ink-muted);
      cursor: pointer;
      border-radius: 6px;
      display: flex; align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      flex-shrink: 0;
      transition: all 0.2s;
      opacity: 0;
    }
    .entry-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover {
      background: #FEE2E2;
      color: #DC2626;
    }

    /* ─── INLINE EDITING ─────────────────────────── */
    .editable-field {
      cursor: text;
      border-radius: 4px;
      padding: 1px 4px;
      margin: -1px -4px;
      transition: background 0.15s, outline 0.15s;
      display: inline-block;
      min-width: 20px;
    }
    .editable-field:hover {
      background: rgba(58,140,98,0.08);
    }
    .editable-field:focus {
      outline: 1.5px solid var(--forest-light);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(58,140,98,0.12);
    }
    /* Special: amount field */
    .editable-amount {
      color: var(--terra);
      font-family: 'DM Mono', monospace;
      font-size: 0.92rem;
      font-weight: 500;
      min-width: 48px;
      text-align: right;
    }
    /* Special: time field */
    .editable-time {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: var(--ink-muted);
    }
    /* Edit pencil hint */
    .edit-hint {
      font-size: 0.52rem;
      color: var(--forest-light);
      margin-left: 4px;
      opacity: 0;
      transition: opacity 0.2s;
      vertical-align: middle;
    }
    .entry-item:hover .edit-hint { opacity: 0.6; }

    /* ─── FILTER BAR ─────────────────────────────── */
    .filter-bar {
      display: flex; gap: 8px;
      margin-bottom: 16px;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid var(--cream-dark);
      background: var(--white);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: var(--ink-light);
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
    }
    .filter-btn:hover { border-color: var(--forest-light); color: var(--forest); }
    .filter-btn.active-all {
      background: var(--forest);
      border-color: var(--forest);
      color: var(--white);
    }
    .filter-btn.active-cash {
      background: rgba(201,146,42,0.12);
      border-color: var(--gold);
      color: var(--gold);
      font-weight: 700;
    }
    .filter-btn.active-upi {
      background: rgba(28,69,50,0.1);
      border-color: var(--forest);
      color: var(--forest);
      font-weight: 700;
    }
    .filter-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-all  { background: var(--white); border: 1.5px solid rgba(255,255,255,0.6); }
    .dot-cash { background: var(--gold); }
    .dot-upi  { background: var(--forest-light); }

    /* ─── FILTER SUMMARY PANEL ───────────────────── */
    .filter-summary {
      display: none;
      margin-top: 24px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      animation: slideIn 0.3s ease;
    }
    .filter-summary.visible { display: block; }

    .fs-header {
      padding: 14px 20px 12px;
      display: flex; align-items: center; gap: 10px;
    }
    .fs-header.cash-theme { background: var(--gold); }
    .fs-header.upi-theme  { background: var(--forest); }

    .fs-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: var(--white); flex-shrink: 0;
    }
    .fs-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 600;
      color: var(--white);
    }
    .fs-subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.65);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .fs-body {
      background: var(--white);
      padding: 18px 20px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      border: 1px solid rgba(0,0,0,0.06);
      border-top: none;
      border-radius: 0 0 var(--radius-lg) var(--radius-lg);
    }
    .fs-stat {
      text-align: center;
      padding: 8px 4px;
    }
    .fs-stat + .fs-stat {
      border-left: 1px solid var(--cream-dark);
    }
    .fs-stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 1.05rem;
      font-weight: 500;
      color: var(--ink);
    }
    .fs-stat-value.highlight-cash { color: var(--gold); }
    .fs-stat-value.highlight-upi  { color: var(--forest); }
    .fs-stat-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 3px;
    }

    /* ─── EMPTY STATE ────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
    }
    .empty-icon {
      font-size: 2.5rem;
      color: var(--cream-dark);
      margin-bottom: 16px;
    }
    .empty-state p {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--ink-muted);
      margin-bottom: 6px;
    }
    .empty-state span {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink-muted);
      opacity: 0.6;
    }

    /* ─── EXPORT / IMPORT TOOLBAR ────────────────── */
    .data-toolbar {
      display: flex; gap: 8px; flex-wrap: wrap;
      background: var(--white);
      border: 1px solid rgba(0,0,0,0.06);
      border-radius: var(--radius);
      padding: 12px 14px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      align-items: center;
    }
    .toolbar-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-right: 4px;
      flex-shrink: 0;
    }
    .toolbar-btn {
      padding: 6px 12px;
      border-radius: 6px;
      border: 1.5px solid var(--cream-dark);
      background: var(--cream);
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.05em;
      color: var(--ink-light);
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .toolbar-btn:hover {
      border-color: var(--forest-light);
      color: var(--forest);
      background: rgba(58,140,98,0.06);
    }
    .toolbar-btn.import-btn:hover {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,146,42,0.06);
    }
    .toolbar-divider {
      width: 1px; height: 20px;
      background: var(--cream-dark);
      margin: 0 4px; flex-shrink: 0;
    }
    #importFileInput { display: none; }

    /* ─── TOAST ──────────────────────────────────── */
    #toast {
      position: fixed; bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      padding: 10px 20px;
      border-radius: 24px;
      font-family: 'DM Mono', monospace;
      font-size: 0.76rem;
      letter-spacing: 0.04em;
      color: var(--white);
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    #toast.success { background: var(--forest); }
    #toast.error   { background: var(--terra); }

    /* ─── RESPONSIVE ─────────────────────────────── */
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
      .metrics-inner { grid-template-columns: 1fr 1fr 1fr; }
      .metric-value { font-size: 0.78rem; }
    }
  </style>
</head>
<body>

  <!-- ─── HEADER ───────────────────────────────────── -->
  <header>
    <div class="header-inner">
      <div class="brand">
        <h1>Spend Ledger</h1>
        <p>Daily Tracking</p>
      </div>
      <div class="currency-wrap">
        <label for="currency">Currency</label>
        <select id="currency">
          <option value="INR">₹ INR</option>
          <option value="USD">$ USD</option>
          <option value="EUR">€ EUR</option>
        </select>
      </div>
    </div>
  </header>

  <!-- ─── METRICS STRIP ───────────────────────────── -->
  <div class="metrics-strip">
    <div class="metrics-inner">
      <div class="metric-card">
        <div class="metric-label">Today's Total</div>
        <div class="metric-value" id="metricTotal">—</div>
      </div>
      <div class="metric-card accent">
        <div class="metric-label">Cash</div>
        <div class="metric-value" id="metricCash">—</div>
      </div>
      <div class="metric-card terra">
        <div class="metric-label">UPI</div>
        <div class="metric-value" id="metricUpi">—</div>
      </div>
    </div>
  </div>

  <!-- ─── MAIN ─────────────────────────────────────── -->
  <main>

    <!-- ADD ENTRY FORM -->
    <div class="form-card">
      <h2><i class="fa fa-plus-circle"></i> New Entry</h2>

      <div class="form-row">
        <div class="field-wrap">
          <label>Date</label>
          <input type="date" id="date" required>
        </div>
        <div class="field-wrap">
          <label>Time</label>
          <input type="time" id="time" required>
        </div>
      </div>

      <div class="form-row">
        <div class="field-wrap">
          <label>Amount</label>
          <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required>
        </div>
        <div class="field-wrap">
          <label>Description</label>
          <input type="text" id="description" placeholder="What was this for?" required>
        </div>
      </div>

      <div class="field-wrap" style="margin-bottom:16px;">
        <label>Payment Type</label>
        <div class="payment-group">
          <button type="button" class="pay-btn" id="btnCash" onclick="selectPayment('cash')">
            <i class="fa fa-money-bill-wave"></i> Cash
          </button>
          <button type="button" class="pay-btn" id="btnUpi" onclick="selectPayment('upi')">
            <i class="fa fa-mobile-alt"></i> UPI
          </button>
        </div>
      </div>

      <button class="submit-btn" onclick="addEntry()">
        <i class="fa fa-check"></i> Record Spend
      </button>
    </div>

    <!-- EXPORT / IMPORT TOOLBAR -->
    <div class="data-toolbar">
      <span class="toolbar-label">Export</span>
      <button class="toolbar-btn" onclick="exportJSON()">
        <i class="fa fa-download"></i> JSON
      </button>
      <button class="toolbar-btn" onclick="exportCSV()">
        <i class="fa fa-file-csv"></i> CSV
      </button>
      <div class="toolbar-divider"></div>
      <span class="toolbar-label">Import</span>
      <button class="toolbar-btn import-btn" onclick="document.getElementById('importFileInput').click()">
        <i class="fa fa-upload"></i> JSON / CSV
      </button>
      <input type="file" id="importFileInput" accept=".json,.csv" onchange="handleImport(event)">
    </div>

    <!-- ENTRIES LIST -->
    <div class="entries-header">
      <h2>All Entries</h2>
      <span class="entry-count" id="entryCount">0 entries</span>
    </div>

    <!-- FILTER BAR -->
    <div class="filter-bar">
      <button class="filter-btn active-all" id="fAll"  onclick="setFilter('all')">
        <span class="filter-dot dot-all"></span> All
      </button>
      <button class="filter-btn" id="fCash" onclick="setFilter('cash')">
        <span class="filter-dot dot-cash"></span> Cash
      </button>
      <button class="filter-btn" id="fUpi"  onclick="setFilter('upi')">
        <span class="filter-dot dot-upi"></span> UPI
      </button>
    </div>

    <div id="entriesList"></div>

    <!-- FILTER SUMMARY PANEL -->
    <div class="filter-summary" id="filterSummary">
      <div class="fs-header" id="fsSummaryHeader">
        <div class="fs-icon" id="fsSummaryIcon"></div>
        <div>
          <div class="fs-title" id="fsSummaryTitle"></div>
          <div class="fs-subtitle">All-time summary</div>
        </div>
      </div>
      <div class="fs-body">
        <div class="fs-stat">
          <div class="fs-stat-value" id="fsSummaryTotal"></div>
          <div class="fs-stat-label">Total Spent</div>
        </div>
        <div class="fs-stat">
          <div class="fs-stat-value" id="fsSummaryCount"></div>
          <div class="fs-stat-label">Transactions</div>
        </div>
        <div class="fs-stat">
          <div class="fs-stat-value" id="fsSummaryAvg"></div>
          <div class="fs-stat-label">Avg per txn</div>
        </div>
      </div>
    </div>

  </main>

  <div id="toast"></div>

  <script>
    // ─── STATE ───────────────────────────────────────
    let entries = [];
    let selectedPayment = '';
    let activeFilter = 'all';

    // ─── FILTER ───────────────────────────────────────
    function setFilter(type) {
      activeFilter = type;
      document.getElementById('fAll').className  = 'filter-btn' + (type === 'all'  ? ' active-all'  : '');
      document.getElementById('fCash').className = 'filter-btn' + (type === 'cash' ? ' active-cash' : '');
      document.getElementById('fUpi').className  = 'filter-btn' + (type === 'upi'  ? ' active-upi'  : '');
      render();
    }

    function getLocale(currency) {
      return { INR: 'en-IN', EUR: 'de-DE', USD: 'en-US' }[currency] || 'en-US';
    }

    function fmt(amount, currency) {
      return new Intl.NumberFormat(getLocale(currency), {
        style: 'currency', currency,
        maximumFractionDigits: 0
      }).format(amount);
    }

    // ─── PAYMENT TOGGLE ──────────────────────────────
    function selectPayment(type) {
      selectedPayment = type;
      document.getElementById('btnCash').classList.toggle('active', type === 'cash');
      document.getElementById('btnUpi').classList.toggle('active', type === 'upi');
    }

    // ─── INIT ─────────────────────────────────────────
    function init() {
      const savedCurrency = localStorage.getItem('currency') || 'INR';
      document.getElementById('currency').value = savedCurrency;

      const saved = localStorage.getItem('spends');
      if (saved) {
        try {
          entries = JSON.parse(saved).map(e => ({
            ...e,
            time: e.time || '00:00',
            paymentType: e.paymentType || 'cash',
            amount: parseFloat(e.amount) || 0
          }));
        } catch(e) { entries = []; }
      }
      setDateTime();
      render();
    }

    function setDateTime() {
      const now = new Date();
      document.getElementById('date').value = now.toISOString().split('T')[0];
      document.getElementById('time').value = now.toTimeString().slice(0, 5);
    }

    // ─── SAVE ─────────────────────────────────────────
    function save() {
      localStorage.setItem('spends', JSON.stringify(entries));
      localStorage.setItem('currency', document.getElementById('currency').value);
    }

    // ─── ADD ──────────────────────────────────────────
    function addEntry() {
      const date   = document.getElementById('date').value;
      const time   = document.getElementById('time').value;
      const amount = parseFloat(document.getElementById('amount').value);
      const desc   = document.getElementById('description').value.trim();

      if (!date || !time || isNaN(amount) || amount <= 0) {
        toast('Please fill all fields correctly', 'error'); return;
      }
      if (!desc) { toast('Add a description', 'error'); return; }
      if (!selectedPayment) { toast('Select payment type', 'error'); return; }

      entries.push({ date, time, amount, description: desc, paymentType: selectedPayment });
      save();
      toast('Entry recorded', 'success');

      document.getElementById('amount').value = '';
      document.getElementById('description').value = '';
      selectPayment('');
      selectedPayment = '';
      setDateTime();
      render();
    }

    // ─── DELETE ───────────────────────────────────────
    function deleteEntry(index) {
      if (!confirm('Delete this entry? This cannot be undone.')) return;
      entries.splice(index, 1);
      save();
      toast('Entry deleted', 'error');
      render();
    }

    // ─── RENDER ───────────────────────────────────────
    function render() {
      const currency = document.getElementById('currency').value;
      const list = document.getElementById('entriesList');
      const today = new Date().toISOString().split('T')[0];

      // Apply filter
      const visible = activeFilter === 'all'
        ? entries
        : entries.filter(e => e.paymentType === activeFilter);

      // Update count
      const label = activeFilter === 'all' ? '' : ` ${activeFilter}`;
      document.getElementById('entryCount').textContent =
        visible.length + (visible.length === 1 ? `${label} entry` : `${label} entries`);

      if (visible.length === 0) {
        const msg = activeFilter === 'all'
          ? 'No entries yet'
          : `No ${activeFilter.toUpperCase()} entries`;
        const sub = activeFilter === 'all'
          ? 'Start recording your daily spends above'
          : `Switch filter or add a ${activeFilter} transaction`;
        list.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon"><i class="fa fa-book-open"></i></div>
            <p>${msg}</p>
            <span>${sub}</span>
          </div>`;
        updateMetrics(currency);
        return;
      }

      // Group by date, sorted newest first
      const groups = {};
      visible.forEach((e) => {
        const i = entries.indexOf(e);
        if (!groups[e.date]) groups[e.date] = [];
        groups[e.date].push({ ...e, _index: i });
      });
      const sortedDates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

      list.innerHTML = sortedDates.map(date => {
        const label = formatDateLabel(date, today);
        const items = groups[date].sort((a, b) => b.time.localeCompare(a.time));

        return `
          <div class="date-group">
            <div class="date-group-label">${label}</div>
            ${items.map(e => `
              <div class="entry-item" data-index="${e._index}">
                <div class="pay-badge ${e.paymentType}" title="Click to toggle payment type"
                     onclick="togglePayType(${e._index})" style="cursor:pointer;">
                  <i class="fa fa-${e.paymentType === 'cash' ? 'money-bill-wave' : 'mobile-alt'}"></i>
                </div>
                <div class="entry-body">
                  <div class="entry-desc">
                    <span class="editable-field"
                          contenteditable="true"
                          data-index="${e._index}"
                          data-field="description"
                          spellcheck="false"
                          title="Click to edit description"
                    >${escHtml(e.description)}</span>
                    <i class="fa fa-pencil edit-hint"></i>
                  </div>
                  <div class="entry-meta">
                    <span class="editable-field editable-time"
                          contenteditable="true"
                          data-index="${e._index}"
                          data-field="time"
                          title="Click to edit time"
                    >${e.time}</span>
                    · ${e.paymentType.toUpperCase()}
                  </div>
                </div>
                <div class="entry-amount">
                  <span class="editable-field editable-amount"
                        contenteditable="true"
                        data-index="${e._index}"
                        data-field="amount"
                        title="Click to edit amount"
                  >${e.amount}</span>
                </div>
                <button class="delete-btn" onclick="deleteEntry(${e._index})" title="Delete">
                  <i class="fa fa-times"></i>
                </button>
              </div>
            `).join('')}
          </div>`;
      }).join('');

      updateMetrics(currency);
      updateFilterSummary(currency);
      attachEditListeners();
    }

    // ─── INLINE EDIT: attach blur listeners after render ─
    function attachEditListeners() {
      document.querySelectorAll('.editable-field').forEach(el => {
        // Prevent newlines on Enter — commit edit instead
        el.addEventListener('keydown', e => {
          if (e.key === 'Enter') { e.preventDefault(); el.blur(); }
          if (e.key === 'Escape') {
            // Restore original value on Escape
            const idx   = parseInt(el.dataset.index);
            const field = el.dataset.field;
            el.textContent = field === 'amount'
              ? entries[idx].amount
              : entries[idx][field];
            el.blur();
          }
        });

        el.addEventListener('blur', () => {
          const idx   = parseInt(el.dataset.index);
          const field = el.dataset.field;
          const raw   = el.textContent.trim();
          const currency = document.getElementById('currency').value;

          if (field === 'description') {
            if (!raw) { toast('Description cannot be empty', 'error'); el.textContent = entries[idx].description; return; }
            entries[idx].description = raw;

          } else if (field === 'amount') {
            const val = parseFloat(raw.replace(/[^0-9.]/g, ''));
            if (isNaN(val) || val <= 0) { toast('Enter a valid amount', 'error'); el.textContent = entries[idx].amount; return; }
            entries[idx].amount = val;
            // Re-display formatted amount after save
            el.textContent = entries[idx].amount;

          } else if (field === 'time') {
            // Accept HH:MM format
            const timeRx = /^([01]?\d|2[0-3]):([0-5]\d)$/;
            if (!timeRx.test(raw)) { toast('Use HH:MM format (e.g. 14:30)', 'error'); el.textContent = entries[idx].time; return; }
            entries[idx].time = raw;
          }

          save();
          toast('Saved ✓', 'success');
          updateMetrics(currency);
        });
      });
    }

    // ─── TOGGLE PAYMENT TYPE ──────────────────────────
    function togglePayType(index) {
      entries[index].paymentType = entries[index].paymentType === 'cash' ? 'upi' : 'cash';
      save();
      toast('Payment type updated', 'success');
      render();
    }

    // ─── METRICS ─────────────────────────────────────
    function updateMetrics(currency) {
      const today = new Date().toISOString().split('T')[0];
      const todayEntries = entries.filter(e => e.date === today);
      const total = todayEntries.reduce((s, e) => s + e.amount, 0);
      const cash  = todayEntries.filter(e => e.paymentType === 'cash').reduce((s, e) => s + e.amount, 0);
      const upi   = todayEntries.filter(e => e.paymentType === 'upi').reduce((s, e) => s + e.amount, 0);

      document.getElementById('metricTotal').textContent = total > 0 ? fmt(total, currency) : '—';
      document.getElementById('metricCash').textContent  = cash  > 0 ? fmt(cash,  currency) : '—';
      document.getElementById('metricUpi').textContent   = upi   > 0 ? fmt(upi,   currency) : '—';
    }

    // ─── FILTER SUMMARY PANEL ────────────────────────
    function updateFilterSummary(currency) {
      const panel = document.getElementById('filterSummary');

      if (activeFilter === 'all') {
        panel.classList.remove('visible');
        return;
      }

      const filtered = entries.filter(e => e.paymentType === activeFilter);
      const total    = filtered.reduce((s, e) => s + e.amount, 0);
      const count    = filtered.length;
      const avg      = count > 0 ? total / count : 0;

      const isCash   = activeFilter === 'cash';
      const theme    = isCash ? 'cash-theme' : 'upi-theme';
      const hlClass  = isCash ? 'highlight-cash' : 'highlight-upi';
      const icon     = isCash ? 'fa-money-bill-wave' : 'fa-mobile-alt';
      const title    = isCash ? 'Cash Transactions' : 'UPI Transactions';

      document.getElementById('fsSummaryHeader').className = `fs-header ${theme}`;
      document.getElementById('fsSummaryIcon').innerHTML   = `<i class="fa ${icon}"></i>`;
      document.getElementById('fsSummaryTitle').textContent = title;
      document.getElementById('fsSummaryTotal').className  = `fs-stat-value ${hlClass}`;
      document.getElementById('fsSummaryTotal').textContent = count > 0 ? fmt(total, currency) : '—';
      document.getElementById('fsSummaryCount').className  = `fs-stat-value ${hlClass}`;
      document.getElementById('fsSummaryCount').textContent = count;
      document.getElementById('fsSummaryAvg').className    = `fs-stat-value ${hlClass}`;
      document.getElementById('fsSummaryAvg').textContent  = count > 0 ? fmt(avg, currency) : '—';

      panel.classList.add('visible');
    }

    // ─── EXPORT JSON ──────────────────────────────────
    function exportJSON() {
      if (entries.length === 0) { toast('No entries to export', 'error'); return; }
      const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
      triggerDownload(blob, `spend-ledger-${today()}.json`);
      toast('Exported as JSON', 'success');
    }

    // ─── EXPORT CSV ───────────────────────────────────
    function exportCSV() {
      if (entries.length === 0) { toast('No entries to export', 'error'); return; }
      const headers = ['date', 'time', 'amount', 'description', 'paymentType'];
      const rows = entries.map(e =>
        headers.map(h => {
          const val = String(e[h] ?? '').replace(/"/g, '""');
          return `"${val}"`;
        }).join(',')
      );
      const csv = [headers.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      triggerDownload(blob, `spend-ledger-${today()}.csv`);
      toast('Exported as CSV', 'success');
    }

    // ─── TRIGGER DOWNLOAD ─────────────────────────────
    function triggerDownload(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function today() {
      return new Date().toISOString().split('T')[0];
    }

    // ─── IMPORT ───────────────────────────────────────
    function handleImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          let imported = [];
          if (file.name.endsWith('.json')) {
            imported = parseImportedJSON(e.target.result);
          } else if (file.name.endsWith('.csv')) {
            imported = parseImportedCSV(e.target.result);
          }
          if (imported.length === 0) { toast('No valid entries found in file', 'error'); return; }

          // Merge: skip exact duplicates (same date+time+amount+desc)
          const existing = new Set(entries.map(e => `${e.date}|${e.time}|${e.amount}|${e.description}`));
          const fresh = imported.filter(e => !existing.has(`${e.date}|${e.time}|${e.amount}|${e.description}`));
          entries = [...entries, ...fresh];
          save(); render();
          toast(`Imported ${fresh.length} new entries (${imported.length - fresh.length} duplicates skipped)`, 'success');
        } catch(err) {
          toast('Import failed — check file format', 'error');
        }
      };
      reader.readAsText(file);
      // Reset input so same file can be re-imported if needed
      event.target.value = '';
    }

    function parseImportedJSON(text) {
      const data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error('Expected array');
      return data.map(e => ({
        date:        String(e.date || '').trim(),
        time:        String(e.time || '00:00').trim(),
        amount:      parseFloat(e.amount) || 0,
        description: String(e.description || '').trim(),
        paymentType: ['cash','upi'].includes(e.paymentType) ? e.paymentType : 'cash'
      })).filter(e => e.date && e.description && e.amount > 0);
    }

    function parseImportedCSV(text) {
      const lines = text.trim().split('\n');
      const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim().toLowerCase());
      return lines.slice(1).map(line => {
        const vals = line.match(/(".*?"|[^,]+)/g) || [];
        const obj = {};
        headers.forEach((h, i) => { obj[h] = (vals[i] || '').replace(/"/g,'').trim(); });
        return {
          date:        obj.date || '',
          time:        obj.time || '00:00',
          amount:      parseFloat(obj.amount) || 0,
          description: obj.description || '',
          paymentType: ['cash','upi'].includes(obj.paymenttype) ? obj.paymenttype : 'cash'
        };
      }).filter(e => e.date && e.description && e.amount > 0);
    }

    // ─── HELPERS ──────────────────────────────────────
    function formatDateLabel(dateStr, today) {
      const d = new Date(dateStr + 'T00:00:00');
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      if (dateStr === today) return 'Today';
      if (dateStr === yesterday.toISOString().split('T')[0]) return 'Yesterday';
      return d.toLocaleDateString('en-IN', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    }

    function escHtml(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function toast(msg, type) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = type + ' show';
      clearTimeout(el._t);
      el._t = setTimeout(() => { el.classList.remove('show'); }, 2800);
    }

    // ─── CURRENCY CHANGE ──────────────────────────────
    document.getElementById('currency').addEventListener('change', () => {
      save(); render();
    });

    // ─── KEYBOARD: Enter submits ───────────────────────
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter' && e.target.tagName === 'INPUT') addEntry();
    });

    init();
  </script>
</body>
</html>
